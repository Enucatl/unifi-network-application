services:
  unifi-network-application:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: hardened-xlarge
    cap_add:
      - SETUID
      - SETGID
    read_only: false
    image: lscr.io/linuxserver/unifi-network-application:latest
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
      - /run:rw,exec,nosuid,size=32m # s6 needs /run to be executable.
    cpu_shares: 1024
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Zurich
      - MONGO_USER
      - MONGO_PASS
      - MONGO_HOST=unifi-db
      - MONGO_PORT=27017
      - MONGO_DBNAME=unifi
      - MONGO_AUTHSOURCE=admin
      - MEM_LIMIT=1024 #optional
      - MEM_STARTUP=1024 #optional
    volumes:
      - unifi-network-application-config:/config
    ports:
      - 3478:3478/udp
      - 10001:10001/udp
      - 8080:8080 # This port is for device communication (adoption), not web access.
      # The rest are optional/specific ports you may need:
      - 1900:1900/udp #optional
      - 8843:8843 #optional
      - 8880:8880 #optional
      - 6789:6789 #optional
      - 5514:5514/udp #optional

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.unifi.entrypoints=https"
      - "traefik.http.routers.unifi.rule=Host(`unifi.${DOCKER_DOMAIN}`)"
      - "traefik.http.routers.unifi.tls=true"
      - "traefik.http.services.unifi.loadbalancer.server.scheme=https"
      - "traefik.http.services.unifi.loadbalancer.server.port=8443"

    networks:
      - default
      - traefik_proxy 

  unifi-db:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: hardened-medium
    image: mongo:8
    user: 999:999
    cpu_shares: 1024
    environment:
      - MONGO_INITDB_ROOT_USERNAME
      - MONGO_INITDB_ROOT_PASSWORD
      - MONGO_USER
      - MONGO_PASS
      - MONGO_DBNAME=unifi
      - MONGO_AUTHSOURCE=admin
    volumes:
      - unifi-db-data:/data/db
      - ./init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro
    networks:
      - default

# Define the networks
networks:
  traefik_proxy:
    external: true
  default:
    internal: true

volumes:
  unifi-db-data:
  unifi-network-application-config:
